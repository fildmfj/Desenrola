<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="Css/style.css"> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desenrola</title>
</head>
<body>
    <div class="LogoSite">  
        <img src="Imagens/Logo-Desenrola.png" alt="Logo do site">
    </div>
    <div class="tela-login">
        <div class="card-login">
            <h1>Cadastro</h1> 
            <form>
                <div class="campo-grupo">
                    <label for="digite-matricula">Digite sua Mátricula ou SIAPE:</label>
                    <input type="text" id="campoID" placeholder="Digite sua Mátricula ou SIAPE">
                </div>
                <div class="campo-grupo">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" placeholder="Crie uma senha">
                </div>
                <div class="campo-grupo">
                    <label for="confirmar-senha">Confirmar Senha:</label>
                    <input type="password" id="confirmar-senha" placeholder="Repita a senha">
                </div>
                <div class="campo-grupo" style="font-size: 12px;">
                    <label> Já possui cadastro? <a href="Login.html">Faça Login</a></label> 
                </div>
                <div class="campo-grupo" style="font-size: 12px;">
                    <input class="check" type="checkbox" value="" id="checkDefault">
                    <label for="checkDefault">
                        Eu li e aceito os <a href="termos-de-uso">termos de uso</a>
                    </label>  
                </div>
                <button type="button" class="btn-entrar" onclick="verificar()" onclick="termos()">Entrar</button>
            </form>
        </div>
    </div>
    <footer class="meu-rodape">
        <div class="container-flex">
            <p>&copy; 2026 Desenrola. Todos os direitos reservados.</p>
            <ul class="links">
                <li><a href="javascript:void(0)" onclick="abrirModal('sobre')">Sobre</a></li>
                <li><a href="javascript:void(0)" onclick="abrirModal('contato')">Contato</a></li>
                <li><a href="javascript:void(0)" onclick="abrirModal('ajuda')">Ajuda</a></li>
            </ul>
        </div>
    </footer>

    <div id="modal-info" class="modal">
        <div class="modal-conteudo">
            <span class="fechar" onclick="fecharModal()">&times;</span>
            <h2 id="modal-titulo"></h2>
            <p id="modal-texto"></p>
        </div>
    </div>
    <script src="Js/script.js"></script> 
</body>
</html>
