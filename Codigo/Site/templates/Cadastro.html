<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desenrola</title>
</head>
<body>
    <div class="  LogoSite">  
        <img src="{{ url_for('static', filename='imagens/Logo-Desenrola.png') }}" alt="Logo do site">
    </div>
    <div class="tela-login">
        <div class="card-login">
            <h1>Cadastro</h1> 

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages%}
                    <div class="alerta alerta -{{ category }}"> {{get_flashed_message}} </div>
                {% endfor %}
            {% endwith %}

            <form method="POST" action="{{ url_for('cadastro') }}" id="form-cadastro">
                <div class="campo-grupo">
                    <label for="nome">Nome completo:</label>
                    <input type="text" id="nome" name="nome"
                           placeholder="Seu nome completo">
                </div>
                <div class="campo-grupo">
                    <label for="digite-matricula">Digite sua Mátricula ou SIAPE:</label>
                    <input type="text" id="identificacao" name="identificacao"
                           placeholder="Ex: 20221AB.CDE_I001 ou 1234567"
                           required autocomplete="off">
                    <span class="hint-tipo" id="hint-tipo"></span>
                </div>
                <div class="campo-grupo">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha"
                           placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
                <div class="campo-grupo">
                    <label for="confirmar_senha">Confirmar Senha:</label>
                    <input type="password" id="confirmar_senha" name="confirmar_senha"
                           placeholder="Repita a senha" required>
                    <span class="hint-senha" id="hint-senha"></span>
                </div>
                <div class="campo-grupo" style="font-size:13px;">
                    <label>Já possui cadastro?
                        <a href="{{ url_for('login') }}">Faça Login</a>
                    </label>
                </div>
                <div class="campo-grupo check-grupo">
                    <input type="checkbox" id="termos" name="termos" value="1">
                    <label class="termo" for="termos">
                        Eu li e aceito os
                        <a href="{{ url_for('termos') }}">termos de uso</a>
                    </label>
                </div>
                <button type="submit" class="btn-entrar" id="btn-cadastrar" disabled>
                    Cadastrar
                </button>
            </form>
        </div>
    </div>
    <footer class="rodape">
        <div class="container-flex">
            <p>&copy; 2026 Desenrola. Todos os direitos reservados.</p>
            <ul class="links">
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Contato</a></li>
                <li><a href="#">Ajuda</a></li>
            </ul>
        </div>
    </footer>
    <script src="{{ url_for('static', filename='Js/script.js') }}"></script> 
</body>
</html>
