<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="style.css"> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desenrola</title>
</head>
<body>
    <div class="LogoSite"> 
        <img src="Logo-Desenrola.png" alt="Logo do site">
    </div>
    <div class="tela-login">
        <div class="card-login">
            <h2>Acessar Sistema</h2>
            
            <form>
                <div class="campo-grupo">
                    <label for="usuario">Matrícula ou SIAPE:</label>
                    <input type="text" id="usuario" placeholder="Informação do usuário">
                </div>

                <div class="campo-grupo">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" placeholder="Crie uma senha">
                </div>

                <div class="campo-grupo">
                    <label for="confirmar-senha">Confirmar Senha:</label>
                    <input type="password" id="confirmar-senha" placeholder="Repita a senha">
                </div>

                <button type="submit" class="btn-entrar">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
